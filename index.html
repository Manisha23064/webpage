<!DOCTYPE html>
<html>
<head>
    <title>Welcome Website</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, #4da3e6, #1ee3e3);
            font-family: Arial, sans-serif;
        }

        .container {
            background: #f2f2f2;
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            width: 70%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 55px;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        button {
            background: #4da3e6;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            border-radius: 12px;
            cursor: pointer;
        }

        button:hover {
            background: #2f8ddd;
        }

        #result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>

        <p>Click the button below to see what happens.</p>

        <button onclick="showMessage()">Click Me</button>

        <div id="result"></div>
    </div>

    <script>
        function showMessage() {
            document.getElementById("result").innerHTML =
                "Button Clicked!";

            var SUCCESS_CALLBACK_URL = "appzillon://return";
            successRedirectToAppzillon();
            
        }

        function successRedirectToAppzillon() {
      console.log("→ [4] Redirect initiated:", SUCCESS_CALLBACK_URL);
      // Brief delay so the browser can flush any pending paint
      setTimeout(function () {
        window.location.href = SUCCESS_CALLBACK_URL;
      }, 60);
    }
    </script>

</body>
</html>
